<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fcf9"/>
      <stop offset="100%" stop-color="#edf7f3"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#bcd5ca" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 42px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #14352f; }
      .subtitle { font: 400 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #44685f; }
      .panelTitle { font: 700 34px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #17443b; }
      .item { font: 400 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #456a61; }
      .mid { font: 700 28px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #ffffff; text-anchor: middle; }
      .midNote { font: 400 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #e7f5ef; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg3)"/>
  <text x="90" y="110" class="title">NSTI 项目中的人机协同分工</text>
  <text x="90" y="150" class="subtitle">AI 负责加速与生成，人工负责判断、筛选、校正与最终定稿</text>

  <g filter="url(#shadow3)">
    <rect x="120" y="220" width="520" height="540" rx="34" fill="#ffffff" stroke="#d8e7df"/>
    <text x="180" y="300" class="panelTitle">AI 工具主要承担</text>
    <text x="180" y="370" class="item">1. 需求拆解与结构梳理</text>
    <text x="180" y="425" class="item">2. 调研资料归纳与信息整理</text>
    <text x="180" y="480" class="item">3. 题目改写候选与文案润色</text>
    <text x="180" y="535" class="item">4. 页面代码生成与逻辑补全</text>
    <text x="180" y="590" class="item">5. 样式优化与多轮快速迭代</text>
    <text x="180" y="645" class="item">6. 部署结构整理与材料辅助撰写</text>
  </g>

  <g>
    <circle cx="800" cy="490" r="118" fill="#2b7a67"/>
    <text x="800" y="448" class="mid">项目成果</text>
    <text x="800" y="492" class="mid">由人主导完成</text>
  </g>

  <g filter="url(#shadow3)">
    <rect x="960" y="220" width="520" height="540" rx="34" fill="#ffffff" stroke="#d8e7df"/>
    <text x="1020" y="300" class="panelTitle">人工主要承担</text>
    <text x="1020" y="370" class="item">1. 确定选题与项目价值</text>
    <text x="1020" y="425" class="item">2. 判断校园场景是否真实贴切</text>
    <text x="1020" y="480" class="item">3. 筛选题目并消除“AI 味”表达</text>
    <text x="1020" y="535" class="item">4. 决定维度、命名与结果口径</text>
    <text x="1020" y="590" class="item">5. 控制隐私、免责声明与使用边界</text>
    <text x="1020" y="645" class="item">6. 验收页面效果并完成最终定稿</text>
  </g>

  <path d="M640 490 C690 490, 705 490, 682 490" fill="none" stroke="#2b7a67" stroke-width="6"/>
  <path d="M918 490 C905 490, 890 490, 960 490" fill="none" stroke="#2b7a67" stroke-width="6"/>
</svg>
