<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色图鉴</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="brand">
        <div class="brand__eyebrow">佩奇宇宙互动测评</div>
        <div class="brand__title">角色图鉴</div>
      </div>
    </header>

    <section class="card pageHero">
      <div class="eyebrow">角色资料库</div>
      <h1 class="pageHero__title">角色图鉴</h1>
      <p class="pageHero__subtitle">浏览角色资料、性格标签和结果候选角色，看看这套测试在拿什么做匹配。</p>
      <p class="pageHero__text">这里展示的是用于测试匹配的角色资料层，包括角色简介、标签、物种和是否为主结果候选。</p>
      <div class="actions">
        <a class="btn btn--primary btn--link" href="./index.html">返回首页</a>
        <a class="btn btn--ghost btn--link" href="./evaluation-system.html">查看评价体系</a>
      </div>
    </section>

    <section class="card">
      <div class="filterBar">
        <label class="field">
          <span class="field__label">搜索角色</span>
          <input id="gallerySearch" type="search" placeholder="例如：佩奇 / 乔治 / 兔">
        </label>
        <label class="field">
          <span class="field__label">筛选标签</span>
          <select id="galleryTrait">
            <option value="">全部标签</option>
          </select>
        </label>
        <label class="field">
          <span class="field__label">角色范围</span>
          <select id="galleryScope">
            <option value="all">全部角色</option>
            <option value="featured">仅结果候选</option>
          </select>
        </label>
      </div>
      <div class="sectionHead">
        <div>
          <div class="sectionHead__eyebrow">角色列表</div>
          <h2 class="sectionHead__title">角色档案</h2>
        </div>
        <div class="metaText" id="galleryCount"></div>
      </div>
      <div class="galleryGrid" id="galleryGrid"></div>
    </section>
  </main>

  <script src="../data/processed/ppti_dataset.js"></script>
  <script>
    const data = window.PPTI_DATA;
    const state = { query: "", trait: "", scope: "all" };
    const els = {
      search: document.getElementById("gallerySearch"),
      trait: document.getElementById("galleryTrait"),
      scope: document.getElementById("galleryScope"),
      count: document.getElementById("galleryCount"),
      grid: document.getElementById("galleryGrid"),
    };

    function collectTraits() {
      const set = new Set();
      data.characters.forEach((item) => (item.combined_traits || []).forEach((trait) => set.add(trait)));
      return [...set].sort((a, b) => a.localeCompare(b));
    }

    function renderTraitOptions() {
      els.trait.insertAdjacentHTML(
        "beforeend",
        collectTraits().map((trait) => `<option value="${trait}">${trait}</option>`).join(""),
      );
    }

    function matches(item) {
      const haystack = [item.name, item.summary, item.species, (item.combined_traits || []).join(" ")].join(" ").toLowerCase();
      const queryOk = !state.query || haystack.includes(state.query.toLowerCase());
      const traitOk = !state.trait || (item.combined_traits || []).includes(state.trait);
      const scopeOk = state.scope === "all" || item.featured;
      return queryOk && traitOk && scopeOk;
    }

    function render() {
      const rows = data.characters.filter(matches);
      els.count.textContent = `当前显示 ${rows.length} / ${data.characters.length} 个角色`;
      if (!rows.length) {
        els.grid.innerHTML = '<div class="galleryCard emptyState">没有匹配结果。</div>';
        return;
      }
      els.grid.innerHTML = rows.map((item) => `
        <article class="galleryCard">
          <div class="galleryCard__head">
            <div>
              <div class="eyebrow">${item.featured ? "结果候选" : "角色资料"}</div>
              <div class="galleryCard__title">${item.name_zh || item.name}</div>
            </div>
            <a href="${item.url}" target="_blank" rel="noreferrer">来源</a>
          </div>
          <p class="metaText">${item.species_zh || item.species || "未知物种"}${item.gender_zh ? ` · ${item.gender_zh}` : ""}</p>
          <p class="galleryCard__body">${item.summary_zh || item.summary}</p>
          <div class="chipWrap">${(item.combined_traits_zh || item.combined_traits || []).map((trait) => `<span class="chip">${trait}</span>`).join("")}</div>
        </article>
      `).join("");
    }

    els.search.addEventListener("input", (event) => { state.query = event.target.value; render(); });
    els.trait.addEventListener("change", (event) => { state.trait = event.target.value; render(); });
    els.scope.addEventListener("change", (event) => { state.scope = event.target.value; render(); });

    renderTraitOptions();
    render();
  </script>
</body>
</html>
